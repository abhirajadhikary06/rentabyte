# RentAByte – Render Deployment Configuration
# Place this file at the project root.
# Render auto-detects it for Web Service deployments.

services:
  - type: web
    name: rentabyte-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: POLYGON_RPC_URL
        value: https://rpc-amoy.polygon.technology
      - key: POL_PER_100MB
        value: "0.01"
      - key: CHUNK_SIZE_MB
        value: "5"
      - key: DB_PATH
        value: /opt/render/project/src/rentabyte.db
      # Set these via the Render dashboard (keep them secret):
      - key: CONTRACT_ADDRESS
        sync: false
      - key: PLATFORM_WALLET
        sync: false
      - key: FERNET_KEY
        sync: false
